name: EAS Build

on:
  workflow_dispatch:
    inputs:
      profile:
        description: Build profile
        required: true
        default: development
        type: choice
        options:
          - development
          - preview
          - production

jobs:
  build:
    name: EAS Build Android
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/mobile/package-lock.json

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        working-directory: apps/mobile
        run: npm ci

      - name: Build on EAS
        working-directory: apps/mobile
        run: eas build --platform android --profile ${{ github.event.inputs.profile }} --non-interactive --no-wait
